  - id: 'MEDIUM-1'
    severity: medium
    file: 'src/components/vendas/sale-form-step2.tsx'
    line: 622
    description: 'Select "Tipo de Bem" envolto em <FormItem> sem <FormField control={...} name={...}>. FormMessage não tem contexto de campo — erros de validação para tipo de bem não são exibidos ao usuário. Silêncio na validação: submit bloqueado mas sem mensagem visível.'
    fix: 'Substituir <FormItem> por <FormField control={form.control} name={`installment_schedules.${realIndex}.asset_proposal`}> (ou subpath equivalente). Aplicar o mesmo fix em sale-edit-form.tsx:791.'
    suggested_owner: dev

  - id: 'MEDIUM-2'
    severity: medium
    status: wontfix
    file: 'src/schemas/sale.schema.ts'
    line: 62
    description: 'assetMetadataSchema é discriminated union com discriminante type. Como getDefaultAssetMetadata inclui type no objeto retornado (obrigatório pelo Zod), o payload enviado à API inclui asset_metadata.type além de asset_proposal.type — campo redundante não especificado no contrato de API. Baixo risco se backend ignora campos extras, mas não confirmado.'
    fix: 'WONTFIX: API schema (v1.1.0) define asset_proposal como { [key: string]: unknown } — aceita campos extras sem restrição. Campo type em asset_metadata é válido.'
    suggested_owner: dev

